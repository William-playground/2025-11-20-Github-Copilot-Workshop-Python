<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配達進捗管理システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .stat-card.failed {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }
        
        .stat-card.total {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 3em;
            font-weight: bold;
        }
        
        .date-display {
            text-align: center;
            color: #666;
            font-size: 1.2em;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .recipe-test {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .recipe-test h2 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .ingredient-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .ingredient-btn {
            background: #fff;
            color: #333;
            border: 2px solid #ddd;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .ingredient-btn.selected {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border-color: #11998e;
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 配達進捗管理システム</h1>
        
        <div class="date-display">
            <strong>📅 今日の日付:</strong> <span id="current-date"></span>
        </div>
        
        <div class="stats-container">
            <div class="stat-card success">
                <div class="stat-label">✅ 成功した配達</div>
                <div class="stat-value" id="successful-count">0</div>
            </div>
            
            <div class="stat-card failed">
                <div class="stat-label">❌ 失敗した配達</div>
                <div class="stat-value" id="failed-count">0</div>
            </div>
            
            <div class="stat-card total">
                <div class="stat-label">📊 合計配達数</div>
                <div class="stat-value" id="total-count">0</div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="refreshProgress()">🔄 進捗を更新</button>
        </div>
        
        <div class="recipe-test">
            <h2>🧪 レシピ配達テスト</h2>
            <p style="margin-bottom: 15px; color: #666;">材料を選択して配達をテストしてください:</p>
            
            <div class="ingredient-options">
                <button class="ingredient-btn" onclick="toggleIngredient(3)" data-id="3">
                    🍞 Bread (ID: 3)
                </button>
                <button class="ingredient-btn" onclick="toggleIngredient(2)" data-id="2">
                    🥬 Lettuce (ID: 2)
                </button>
                <button class="ingredient-btn" onclick="toggleIngredient(1)" data-id="1">
                    🍅 Tomato (ID: 1)
                </button>
            </div>
            
            <div style="margin-bottom: 10px; color: #666;">
                <small>💡 ヒント: Sandwich = Bread + Lettuce + Tomato, Salad = Lettuce + Tomato</small>
            </div>
            
            <button onclick="testDelivery()">🚚 配達を実行</button>
            
            <div id="delivery-message"></div>
        </div>
    </div>
    
    <script>
        let selectedIngredients = [];
        
        // 現在の日付を表示
        function updateCurrentDate() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('ja-JP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('current-date').textContent = dateStr;
        }
        
        // 進捗データを取得して表示
        async function refreshProgress() {
            try {
                const response = await fetch('/api/progress/today');
                const data = await response.json();
                
                const progress = data.progress;
                document.getElementById('successful-count').textContent = progress.successful;
                document.getElementById('failed-count').textContent = progress.failed;
                document.getElementById('total-count').textContent = progress.total;
            } catch (error) {
                console.error('進捗の取得に失敗しました:', error);
            }
        }
        
        // 材料の選択/解除
        function toggleIngredient(id) {
            const btn = document.querySelector(`[data-id="${id}"]`);
            const index = selectedIngredients.indexOf(id);
            
            if (index > -1) {
                selectedIngredients.splice(index, 1);
                btn.classList.remove('selected');
            } else {
                selectedIngredients.push(id);
                btn.classList.add('selected');
            }
        }
        
        // 配達をテスト
        async function testDelivery() {
            const messageDiv = document.getElementById('delivery-message');
            
            if (selectedIngredients.length === 0) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '⚠️ 少なくとも1つの材料を選択してください';
                return;
            }
            
            try {
                const response = await fetch('/api/deliver', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ingredients: selectedIngredients
                    })
                });
                
                const data = await response.json();
                
                messageDiv.className = `message ${data.success ? 'success' : 'error'}`;
                messageDiv.textContent = data.message;
                
                // 進捗を更新
                await refreshProgress();
                
                // 選択をクリア
                selectedIngredients = [];
                document.querySelectorAll('.ingredient-btn').forEach(btn => {
                    btn.classList.remove('selected');
                });
                
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ エラーが発生しました: ' + error.message;
            }
        }
        
        // ページ読み込み時に実行
        window.addEventListener('load', () => {
            updateCurrentDate();
            refreshProgress();
        });
    </script>
</body>
</html>
